<header class="w-full bg-white dark:bg-background-dark shadow-soft border-b border-primary/10 sticky top-0 z-50">
  <div class="max-w-[1200px] mx-auto w-full px-4 md:px-10 py-4 flex items-center justify-between whitespace-nowrap">
    <div class="flex items-center gap-8">
      <a routerLink="/" class="flex items-center gap-3 text-text-primary dark:text-slate-100 cursor-pointer">
        <h2 class="text-text-primary dark:text-slate-100 text-xl font-display font-bold leading-tight tracking-tight">Techify</h2>
      </a>
    </div>

    <!-- Search -->
    <div class="hidden md:flex flex-1 justify-center max-w-md mx-8">
      <label class="flex flex-col w-full h-10">
        <div class="flex w-full flex-1 items-stretch rounded-full h-full bg-background-light dark:bg-slate-800 border border-primary/20 shadow-inner focus-within:ring-2 focus-within:ring-primary/50 transition-all">
          <div class="text-slate-500 flex border-none items-center justify-center pl-4 rounded-l-full cursor-pointer" (click)="onSearch(searchInput.value)">
            <span class="material-symbols-outlined text-[20px]">search</span>
          </div>
          <input #searchInput (keyup.enter)="onSearch(searchInput.value)" class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-full text-text-primary dark:text-slate-100 focus:outline-0 focus:ring-0 border-none bg-transparent h-full placeholder:text-slate-400 px-4 text-sm font-medium" placeholder="Search curated gear..." value=""/>
        </div>
      </label>
    </div>

    <div class="flex justify-end gap-6 items-center">
      <div class="hidden lg:flex items-center gap-8 pr-4">
        <a routerLink="/" class="text-text-primary dark:text-slate-200 text-sm font-medium hover:text-primary transition-colors cursor-pointer">Home</a>
        <a routerLink="/products" class="text-text-primary dark:text-slate-200 text-sm font-medium hover:text-primary transition-colors cursor-pointer">Product</a>
        <a routerLink="/about" class="text-text-primary dark:text-slate-200 text-sm font-medium hover:text-primary transition-colors cursor-pointer">About Us</a>
        <a routerLink="/contact" class="text-text-primary dark:text-slate-200 text-sm font-medium hover:text-primary transition-colors cursor-pointer">Contact Us</a>
      </div>

      <ng-container *ngIf="isLoggedIn">
        <div class="flex gap-4 relative profile-menu border-l border-slate-200 dark:border-slate-700 pl-6 border-opacity-50">
          <button (click)="onProfileClick()" class="flex items-center justify-center overflow-hidden rounded-full h-10 w-10 bg-background-light dark:bg-slate-800 text-text-primary dark:text-slate-100 border border-primary/20 hover:bg-primary hover:text-white transition-colors shadow-sm">
            <span class="material-symbols-outlined text-[20px]">person</span>
          </button>

          <!-- Profile Dropdown -->
          <div *ngIf="profileMenuOpen" class="absolute top-12 right-0 w-48 bg-white dark:bg-slate-800 rounded-lg shadow-lg border border-primary/10 py-2 z-50">
            <div class="px-4 py-2 border-b border-primary/10 mb-2">
              <p class="text-sm font-medium text-text-primary dark:text-white">{{ userName ? userName : 'Guest User' }}</p>
            </div>
            <a *ngIf="isAdmin" (click)="navigateToAdmin()" class="block px-4 py-2 text-sm text-text-primary dark:text-slate-200 hover:bg-primary/5 cursor-pointer">Admin Panel</a>
            <a *ngIf="!isAdmin" (click)="navigateToDashboard()" class="block px-4 py-2 text-sm text-text-primary dark:text-slate-200 hover:bg-primary/5 cursor-pointer">Dashboard</a>
            <a (click)="logout()" class="block px-4 py-2 text-sm text-red-500 hover:bg-red-50 dark:hover:bg-red-900/10 cursor-pointer">Log Out</a>
          </div>
        </div>
      </ng-container>

      <ng-container *ngIf="!isLoggedIn">
        <div class="border-l border-slate-200 dark:border-slate-700 pl-6 border-opacity-50">
          <button routerLink="/auth" class="flex items-center justify-center rounded-full h-10 px-6 bg-primary text-white text-sm font-bold shadow-md shadow-primary/20 hover:bg-primary/90 transition-all">
            Sign In
          </button>
        </div>
      </ng-container>

      <button routerLink="/cart" class="flex items-center justify-center overflow-hidden rounded-full h-10 w-10 bg-primary text-white shadow-md hover:bg-primary/90 transition-colors relative">
        <span class="material-symbols-outlined text-[20px]">shopping_bag</span>
        <span *ngIf="cartCount > 0" class="absolute top-2 right-2 h-2 w-2 bg-red-400 shadow-sm border border-white rounded-full"></span>
      </button>
    </div>
  </div>
</header>
