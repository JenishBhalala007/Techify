<div class="fixed inset-0 w-full h-full bg-slate-50 dark:bg-background-dark overflow-y-auto z-50">

  <!-- Navbar inside the scrollable container so it scrolls with the page, ensuring top form content is never blocked by a fixed header -->
  <header class="w-full flex items-center justify-between px-8 py-4 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md shadow-sm border-b border-slate-200 dark:border-slate-800">
    <h2 class="text-xl font-bold text-slate-900 dark:text-white">Techify</h2>
    <a routerLink="/" class="text-sm font-medium text-slate-600 dark:text-slate-300 hover:text-primary transition-colors">Home</a>
  </header>

  <!-- Form Container with padding to ensure breathing room on all sides -->
  <div class="w-full min-h-[calc(100%-80px)] flex justify-center py-10 px-4">
    <!-- max-w-[480px] strictly bounds the card width, mt-0 ensures it starts immediately under the padding -->
    <div class="w-full max-w-[480px] h-max bg-white dark:bg-slate-900 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.06)] dark:shadow-[0_8px_30px_rgb(0,0,0,0.3)] border border-slate-100 dark:border-slate-800 p-8 flex flex-col gap-6">

      <!-- Header Section -->
      <div class="flex flex-col gap-2">
        <h1 class="text-3xl sm:text-4xl font-black text-slate-900 dark:text-white tracking-tight">Create account</h1>
        <p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">Join Techify to discover Nordic-inspired tech accessories tailored for your lifestyle.</p>
        
        <div *ngIf="error" class="bg-red-50 text-red-600 border border-red-200 rounded-lg p-3 text-sm flex items-start gap-2 mt-2">
          <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <span class="mt-0.5">{{ error }}</span>
        </div>
      </div>

      <form (ngSubmit)="onSubmit()" [formGroup]="signupForm" class="flex flex-col gap-4">

        <!-- Google OAuth Button -->
        <button type="button" class="flex items-center justify-center gap-3 w-full h-[46px] rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 text-sm font-semibold shadow-sm transition-all focus:ring-2 focus:ring-primary focus:ring-offset-1">
          <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Sign up with Google
        </button>

        <!-- Or Divider -->
        <div class="relative flex py-2 items-center w-full">
          <div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
          <span class="flex-shrink-0 mx-4 text-slate-400 dark:text-slate-500 text-sm">or</span>
          <div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
        </div>

        <!-- Name Field -->
        <label class="flex flex-col gap-1.5 w-full">
          <span class="text-sm font-semibold text-slate-700 dark:text-slate-300">Full Name</span>
          <input formControlName="name" type="text" placeholder="e.g. Jane Doe"
            class="w-full h-[46px] rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-background-dark/50 px-4 text-slate-900 dark:text-white placeholder:text-slate-400 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all"/>
        </label>

        <!-- Email Field -->
        <label class="flex flex-col gap-1.5 w-full">
          <span class="text-sm font-semibold text-slate-700 dark:text-slate-300">Email Address</span>
          <input formControlName="email" type="email" placeholder="jane@example.com"
            class="w-full h-[46px] rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-background-dark/50 px-4 text-slate-900 dark:text-white placeholder:text-slate-400 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all"/>
        </label>

        <!-- Password Field -->
        <label class="flex flex-col gap-1.5 w-full">
          <span class="text-sm font-semibold text-slate-700 dark:text-slate-300">Password</span>
          <input formControlName="password" type="password" placeholder="Create a strong password"
            class="w-full h-[46px] rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-background-dark/50 px-4 text-slate-900 dark:text-white placeholder:text-slate-400 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all"/>
        </label>

        <!-- Phone Field -->
        <label class="flex flex-col gap-1.5 w-full">
          <span class="text-sm font-semibold text-slate-700 dark:text-slate-300">Phone Number <span class="text-slate-400 font-normal ml-1">(Optional)</span></span>
          <input formControlName="phone" type="tel" placeholder="+91 1234567890"
            class="w-full h-[46px] rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-background-dark/50 px-4 text-slate-900 dark:text-white placeholder:text-slate-400 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all"/>
        </label>

        <!-- Optional Address Block -->
        <div formGroupName="address" class="flex flex-col gap-4 mt-2 pt-4 border-t border-slate-100 dark:border-slate-800">
          <h3 class="text-sm font-bold text-slate-900 dark:text-white">Shipping Address <span class="text-slate-400 font-normal ml-1 text-xs">(Optional)</span></h3>

          <label class="flex flex-col gap-1 w-full">
            <span class="text-xs font-semibold text-slate-600 dark:text-slate-400">Street Address</span>
            <input formControlName="street" type="text" placeholder="123 Main St, Apt 4B"
              class="w-full h-10 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-background-dark/50 px-4 text-slate-900 dark:text-white text-sm placeholder:text-slate-400 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all"/>
          </label>

          <div class="grid grid-cols-2 gap-3 w-full">
            <label class="flex flex-col gap-1">
              <span class="text-xs font-semibold text-slate-600 dark:text-slate-400">City</span>
              <input formControlName="city" type="text" placeholder="City"
                class="w-full h-10 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-background-dark/50 px-4 text-slate-900 dark:text-white text-sm placeholder:text-slate-400 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all"/>
            </label>
            <label class="flex flex-col gap-1">
              <span class="text-xs font-semibold text-slate-600 dark:text-slate-400">State / Province</span>
              <input formControlName="state" type="text" placeholder="State"
                class="w-full h-10 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-background-dark/50 px-4 text-slate-900 dark:text-white text-sm placeholder:text-slate-400 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all"/>
            </label>
          </div>

          <div class="grid grid-cols-2 gap-3 w-full">
            <label class="flex flex-col gap-1">
              <span class="text-xs font-semibold text-slate-600 dark:text-slate-400">Zip Code</span>
              <input formControlName="zipCode" type="text" placeholder="12345"
                class="w-full h-10 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-background-dark/50 px-4 text-slate-900 dark:text-white text-sm placeholder:text-slate-400 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all"/>
            </label>
            <label class="flex flex-col gap-1">
              <span class="text-xs font-semibold text-slate-600 dark:text-slate-400">Country</span>
              <input formControlName="country" type="text" placeholder="Country"
                class="w-full h-10 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-background-dark/50 px-4 text-slate-900 dark:text-white text-sm placeholder:text-slate-400 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all"/>
            </label>
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" [disabled]="loading || signupForm.invalid"
          class="w-full h-[46px] mt-4 rounded-lg bg-primary hover:bg-primary/90 text-white font-bold shadow-md shadow-primary/20 transition-all focus:ring-2 focus:ring-primary focus:ring-offset-2 disabled:opacity-60 disabled:shadow-none disabled:cursor-not-allowed">
          <span *ngIf="!loading">Create Account</span>
          <span *ngIf="loading" class="flex items-center justify-center gap-2">
            <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Creating Account...
          </span>
        </button>

        <p class="text-center text-sm text-slate-500 dark:text-slate-400 mt-2">
          Already have an account? 
          <a routerLink="/auth/login" class="text-primary font-bold hover:underline">Log in</a>
        </p>

      </form>
    </div>
  </div>
</div>
