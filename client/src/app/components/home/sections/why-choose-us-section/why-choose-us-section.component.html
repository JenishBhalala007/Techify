<section class="mb-20 max-w-[1200px] w-full mx-auto px-4 md:px-10" aria-labelledby="why-choose-us-heading">
  <div class="flex items-end justify-between gap-4 mb-8">
    <div>
      <p class="text-primary text-xs sm:text-sm font-semibold uppercase tracking-widest">Value Proposition</p>
      <h2 id="why-choose-us-heading" class="text-text-primary dark:text-white text-2xl font-bold tracking-tight font-display">
        Why Choose Us
      </h2>
    </div>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
    <article *ngFor="let item of valueProps" class="rounded-2xl border border-primary/10 bg-white dark:bg-slate-800 p-6 shadow-sm hover:shadow-md transition-shadow">
      <div class="h-12 w-12 rounded-full bg-primary/10 text-primary flex items-center justify-center mb-4">
        <span class="material-symbols-outlined text-[22px]">{{ item.icon }}</span>
      </div>
      <h3 class="text-text-primary dark:text-white text-base font-bold mb-2">{{ item.title }}</h3>
      <p class="text-sm text-slate-600 dark:text-slate-300 leading-relaxed">{{ item.description }}</p>
    </article>
  </div>
</section>
