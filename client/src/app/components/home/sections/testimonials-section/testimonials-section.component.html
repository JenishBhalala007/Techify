<section class="mb-20 max-w-[1200px] w-full mx-auto px-4 md:px-10" aria-labelledby="testimonials-heading">
  <div class="mb-8">
    <p class="text-primary text-xs sm:text-sm font-semibold uppercase tracking-widest">Social Proof</p>
    <h2 id="testimonials-heading" class="text-text-primary dark:text-white text-2xl font-bold tracking-tight font-display">
      What Customers Say
    </h2>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <article *ngFor="let testimonial of testimonials" class="rounded-2xl border border-primary/10 bg-white dark:bg-slate-800 p-6 shadow-sm hover:shadow-md transition-shadow">
      <div class="flex items-center gap-3 mb-4">
        <img [src]="testimonial.avatar" [alt]="testimonial.name" class="w-12 h-12 rounded-full object-cover border border-primary/20" />
        <div>
          <h3 class="text-text-primary dark:text-white font-bold text-sm">{{ testimonial.name }}</h3>
          <div class="flex items-center gap-1 mt-1">
            <span *ngFor="let star of stars(testimonial.rating)" class="material-symbols-outlined text-[14px] text-primary">star</span>
          </div>
        </div>
      </div>
      <p class="text-sm text-slate-600 dark:text-slate-300 leading-relaxed">{{ testimonial.review }}</p>
    </article>
  </div>
</section>
